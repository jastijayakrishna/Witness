version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hubbleops
      POSTGRES_PASSWORD: hubbleops
      POSTGRES_DB: hubbleops
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hubbleops"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  proxy:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      HUBBLEOPS_ENV: "dev"
      HUBBLEOPS_DEV_AUTH_BYPASS: "true"
      HUBBLEOPS_METRICS_PUBLIC: "true"
      HUBBLEOPS_SERVER_HOST: "0.0.0.0"
      HUBBLEOPS_SERVER_PORT: "8080"
      HUBBLEOPS_POSTGRES_HOST: "postgres"
      HUBBLEOPS_POSTGRES_PORT: "5432"
      HUBBLEOPS_POSTGRES_USER: "hubbleops"
      HUBBLEOPS_POSTGRES_PASSWORD: "hubbleops"
      HUBBLEOPS_POSTGRES_DBNAME: "hubbleops"
      HUBBLEOPS_POSTGRES_SSLMODE: "disable"
      HUBBLEOPS_REDIS_HOST: "redis"
      HUBBLEOPS_REDIS_PORT: "6379"
      HUBBLEOPS_WAL_DIR: "/data/wal"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../configs:/app/configs:ro
      - waldata:/data/wal

  waldrain:
    build:
      context: ..
      dockerfile: Dockerfile.waldrain
    ports:
      - "9090:9090"
    environment:
      HUBBLEOPS_POSTGRES_HOST: "postgres"
      HUBBLEOPS_POSTGRES_PORT: "5432"
      HUBBLEOPS_POSTGRES_USER: "hubbleops"
      HUBBLEOPS_POSTGRES_PASSWORD: "hubbleops"
      HUBBLEOPS_POSTGRES_DBNAME: "hubbleops"
      HUBBLEOPS_POSTGRES_SSLMODE: "disable"
      HUBBLEOPS_WAL_DIR: "/data/wal"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../configs:/app/configs:ro
      - waldata:/data/wal

volumes:
  pgdata:
  waldata:
