environment: "prod"

server:
  host: "0.0.0.0"
  port: 8080

postgres:
  host: "postgres"
  port: 5432
  user: "hubbleops"
  password: "hubbleops"
  dbname: "hubbleops"
  sslmode: "disable"

redis:
  host: "redis"
  port: 6379
  password: ""
  db: 0

wal:
  dir: "data/wal"
  sync_mode: "batch"  # "batch" (default, ~100ms durability window) or "sync" (fsync per write)

auth:
  enabled: true
  dev_auth_bypass: false
  metrics_public: false

capture:
  mode: "fingerprint"
  allow_raw_in_prod: false
  allow_raw_in_prod_note: ""

outcome_capture:
  enabled: true
  mode: "fingerprint"
  raw: false

reviews:
  raw_notes: false

receipts:
  require_receipt_for_block: true
  enforce_without_receipt: false

loop_detection:
  enabled: true
  action: "shadow"             # "shadow" (default) → "warn" → "block". Promote after shadow report looks right.
  max_repeated: 3
  velocity_accel_ratio: 1.5
  velocity_window_ms: 300000   # 5 minutes
  warn_confidence: 0.40
  block_confidence: 0.70
  require_session_for_block: true

budget:
  daily_soft_usd: 0            # 0 = disabled. Soft limit triggers warning.
  daily_hard_usd: 50.0         # Hard limit triggers 429 block. The seatbelt.
  reserve_per_request_usd: 0.50  # Atomic reservation per request to prevent concurrent overshoot.

alerts:
  webhook_url: ""              # Slack/webhook URL for loop alerts. Empty = disabled.
